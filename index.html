<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Descarga Segura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(5, 5, 5, 0.85);
        }

        .backdrop-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.35);
            transform: scale(1.1);
            z-index: -1;
        }

        .meta-content {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            max-width: 85%;
            animation: fadeIn 0.8s ease;
        }
        .media-title {
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        .episode-title {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 15px;
            font-weight: 400;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Contenedor de la barra de carga */
        .progress-container {
            width: 280px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* Barra que se va llenando */
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #00aa66, #00ff88);
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            transition: width 0.1s linear;
        }

        .status-text {
            color: #ffffff;
            font-size: 1.1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .error-msg { 
            color: #ff4444; 
            display: none; 
            text-align: center; 
            z-index: 20;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="overlay" class="overlay-screen">
            <div id="backdrop" class="backdrop-bg"></div>
            
            <div id="metaContent" class="meta-content" style="display: none;">
                <h1 id="mediaTitle" class="media-title">Cargando...</h1>
                <div id="episodeTitle" class="episode-title" style="display: none;"></div>
            </div>

            <div id="loadingBlock" class="progress-container" style="display: none;">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <div id="status" class="status-text">Comprobando enlace seguro...</div>
        </div>
        
        <div id="error" class="error-msg"><h2>Enlace de descarga no disponible</h2></div>
    </div>

    <script>
        const TMDB_API_KEY = '51800c8d9e13631a7ded6f17f363e7a5'; // Pon tu clave de TMDB aquí
        let urlDescarga = "";
        const TIEMPO_ESPERA = 3000; // Tiempo en milisegundos (3 segundos)

        async function inicializar() {
            const hashRaw = window.location.hash.substring(1);
            const partes = hashRaw.split('-'); 

            if (partes.length === 5) {
                const tmdbId = partes[1];    
                const temporada = partes[2]; 
                const episodio = partes[3];  
                const base64Url = partes[4]; 

                procesarDescarga(base64Url, () => obtenerDatosEpisodioTMDB(tmdbId, temporada, episodio));
            } 
            else if (partes.length === 3) {
                const tipo = partes[0];      
                const tmdbId = partes[1];    
                const base64Url = partes[2]; 

                procesarDescarga(base64Url, () => obtenerDatosGeneralesTMDB(tipo, tmdbId));
            } 
            else {
                mostrarError("Estructura de descarga inválida.");
            }
        }

        function procesarDescarga(base64Url, funcionTMDB) {
            try {
                const urlReal = atob(base64Url);
                if (urlReal.startsWith('http://') || urlReal.startsWith('https://')) {
                    urlDescarga = urlReal;
                } else { throw new Error(); }

                funcionTMDB().then(() => {
                    document.getElementById('metaContent').style.display = 'block';
                    document.getElementById('loadingBlock').style.display = 'block';
                    iniciarContador();
                }).catch(() => {
                    // Si falla TMDB, igual procesa la descarga en modo genérico
                    document.getElementById('mediaTitle').innerText = "Tu archivo está listo";
                    document.getElementById('metaContent').style.display = 'block';
                    document.getElementById('loadingBlock').style.display = 'block';
                    iniciarContador();
                });

            } catch (e) {
                mostrarError("El enlace de descarga está dañado o incompleto.");
            }
        }

        // Inicia la barra de progreso animada y redirige
        function iniciarContador() {
            const bar = document.getElementById('progressBar');
            const status = document.getElementById('status');
            let progreso = 0;
            const intervaloTiempo = 100; // Actualiza cada 100ms
            const pasos = TIEMPO_ESPERA / intervaloTiempo;
            const incremento = 100 / pasos;

            status.innerText = "Generando enlace de descarga...";

            const contador = setInterval(() => {
                progreso += incremento;
                bar.style.width = `${Math.min(progreso, 100)}%`;

                if (progreso >= 50 && progreso < 85) {
                    status.innerText = "Verificando servidores...";
                }
                if (progreso >= 85) {
                    status.innerText = "¡Listo! Redireccionando...";
                }

                if (progreso >= 100) {
                    clearInterval(contador);
                    // Redirección directa al enlace real de descarga
                    window.location.href = urlDescarga;
                }
            }, intervaloTiempo);
        }

        async function obtenerDatosGeneralesTMDB(tipo, id) {
            const url = `https://api.themoviedb.org/3/${tipo}/${id}?api_key=${TMDB_API_KEY}&language=es-ES`;
            try {
                const respuesta = await fetch(url);
                if (!respuesta.ok) return;
                const datos = await respuesta.json();
                document.getElementById('mediaTitle').innerText = `Descargar: ${datos.title || datos.name}`;
                if (datos.backdrop_path) {
                    document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${datos.backdrop_path}')`;
                }
            } catch (error) { console.log(error); }
        }

        async function obtenerDatosEpisodioTMDB(idSerie, temp, ep) {
            const urlEpisodio = `https://api.themoviedb.org/3/tv/${idSerie}/season/${temp}/episode/${ep}?api_key=${TMDB_API_KEY}&language=es-ES`;
            const urlSerie = `https://api.themoviedb.org/3/tv/${idSerie}?api_key=${TMDB_API_KEY}&language=es-ES`;

            try {
                const [resEp, resSerie] = await Promise.all([fetch(urlEpisodio), fetch(urlSerie)]);
                
                if (resEp.ok) {
                    const datosEp = await resEp.json();
                    document.getElementById('mediaTitle').innerText = `Descargar: T${temp} × E${ep}`;
                    if(datosEp.name) {
                        const epTitleDiv = document.getElementById('episodeTitle');
                        epTitleDiv.innerText = datosEp.name;
                        epTitleDiv.style.display = 'block';
                    }
                }
                if (resSerie.ok) {
                    const datosSerie = await resSerie.json();
                    if (document.getElementById('mediaTitle').innerText === "Cargando...") {
                        document.getElementById('mediaTitle').innerText = `Descargar: ${datosSerie.name}`;
                    } else {
                        document.getElementById('mediaTitle').innerText = `${datosSerie.name} (T${temp} × E${ep})`;
                    }
                    if (datosSerie.backdrop_path) {
                        document.getElementById('backdrop').style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${datosSerie.backdrop_path}')`;
                    }
                }
            } catch (error) { console.log(error); }
        }

        function mostrarError(msg) {
            document.getElementById('overlay').style.display = 'none';
            if(msg) document.getElementById('error').innerHTML = `<h2>${msg}</h2>`;
            document.getElementById('error').style.display = 'block';
        }

        window.onload = inicializar;
    </script>
</body>
</html>
